<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NotaSound Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0f0f0f);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #b1b1b1);
            --button: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #1c1c1d);
            --accent: #3390ec; /* Telegram Blue */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Красивый скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--hint); border-radius: 10px; }

        header {
            padding: 25px 20px 10px;
            font-size: 28px;
            font-weight: 700;
        }

        .main-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 120px;
            scroll-behavior: smooth;
        }

        .tab-content { display: none; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .tab-content.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Поиск в стиле Spotify */
        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 10px 0 15px;
            z-index: 10;
        }

        .search-bar {
            background: var(--sec-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            transition: all 0.2s ease;
            cursor: text;
        }

        .search-bar:focus-within {
            background: #2c2c2e;
            box-shadow: 0 0 0 2px var(--button);
        }

        input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 16px;
            width: 100%;
            outline: none;
            cursor: text;
        }

        /* Фильтры источников */
        .source-chips {
            display: flex;
            gap: 10px;
            margin: 15px 0 5px;
        }

        .chip {
            padding: 8px 20px;
            border-radius: 30px;
            background: var(--sec-bg);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer; /* Исправлено: теперь палец */
            transition: 0.2s ease;
            border: none;
            color: var(--text);
        }

        .chip.active {
            background: var(--button);
            color: var(--button-text);
        }

        .chip:hover { opacity: 0.85; transform: translateY(-1px); }

        /* Карточки треков */
        .track-card {
            background: linear-gradient(90deg, var(--sec-bg) 0%, transparent 100%);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer; /* Исправлено: теперь палец */
            transition: all 0.2s;
        }

        .track-card:hover {
            background: var(--sec-bg);
            transform: translateX(4px);
        }

        .track-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--button), #50a7f9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .track-info { flex: 1; overflow: hidden; }
        .track-name { 
            font-weight: 600; 
            font-size: 16px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .track-artist { font-size: 13px; color: var(--hint); margin-top: 3px; }

        /* Загрузка */
        .upload-section {
            background: var(--sec-bg);
            border-radius: 22px;
            padding: 40px 20px;
            text-align: center;
            border: 1px dashed var(--hint);
            margin-top: 20px;
        }

        /* Нижнее меню */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(var(--bg), 0.85);
            backdrop-filter: blur(15px);
            border-top: 0.5px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 30px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--hint);
            font-size: 10px;
            font-weight: 500;
            flex: 1;
            cursor: pointer; /* Исправлено: теперь палец */
            transition: 0.2s;
        }

        .nav-item.active { color: var(--button); transform: translateY(-2px); }
        .nav-item:active { transform: scale(0.9); }
        
        .nav-icon { font-size: 24px; }

        /* Скрываем старую пагинацию */
        .pagination { display: none; }

    </style>
</head>
<body>

    <header id="headerTitle">Поиск</header>

    <div class="main-container">
        <div id="tab-search" class="tab-content active">
            <div class="search-container">
                <div class="search-bar" onclick="document.getElementById('searchInput').focus()">
                    <input type="text" id="searchInput" placeholder="Что хочешь послушать?" oninput="handleSearch(this.value)">
                </div>
                <div class="source-chips">
                    <button id="chip-nota" class="chip active" onclick="setMode('Nota')">📁 Моя база</button>
                    <button id="chip-sc" class="chip" onclick="setMode('SoundCloud')">🌐 SoundCloud</button>
                </div>
            </div>
            <div id="searchResults">
                </div>
        </div>

        <div id="tab-favs" class="tab-content">
            <div id="favResults">
                <p style="color: var(--hint); text-align: center; margin-top: 40px;">Твое избранное появится в чате.</p>
            </div>
        </div>

        <div id="tab-upload" class="tab-content">
            <div class="upload-section">
                <div style="font-size: 50px; margin-bottom: 20px;">📤</div>
                <h3 style="margin: 0 0 10px;">Добавить музыку</h3>
                <p style="color: var(--hint); font-size: 14px; line-height: 1.5;">Просто отправь аудиофайл боту в чат. Я увижу его и добавлю в базу **Nota**.</p>
                <button class="chip active" style="margin-top: 20px; width: 80%; padding: 12px;" onclick="tg.close()">Вернуться в чат</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="switchTab('search', 'Поиск')">
            <span class="nav-icon">🏠</span>
            <span>ГЛАВНАЯ</span>
        </div>
        <div class="nav-item" onclick="switchTab('favs', 'Избранное')">
            <span class="nav-icon">❤️</span>
            <span>ЛЮБИМОЕ</span>
        </div>
        <div class="nav-item" onclick="switchTab('upload', 'Загрузка')">
            <span class="nav-icon">☁️</span>
            <span>ОБЛАКО</span>
        </div>
    </nav>

    <script>
        const API_BASE = 'https://fruity-papers-turn.loca.lt'; // замените на свой адрес от localtunnel
        const tg = window.Telegram.WebApp;
        tg.expand();
        const initData = tg.initData;
        tg.enableClosingConfirmation();

        let searchTimer;

        function switchTab(tab, title) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('headerTitle').innerText = title;

            // Связь с бэкендом
            if (tab === 'favs') tg.sendData("❤️ Избранное");
            if (tab === 'upload') tg.sendData("☁️ Загрузить");
            if (tab === 'search') tg.sendData("🔍 Поиск");
            
            tg.HapticFeedback.impactOccurred('light');

            if (tab === 'favs') loadFavorites();
            if (tab === 'upload') {} // без изменений
        }

        function setMode(mode) {
            document.getElementById('chip-nota').classList.toggle('active', mode === 'Nota');
            document.getElementById('chip-sc').classList.toggle('active', mode === 'SoundCloud');
            tg.sendData(mode === 'Nota' ? "📁 Nota" : "🌐 SoundCloud");
            tg.HapticFeedback.selectionChanged();
        }

        function handleSearch(val) {
            clearTimeout(searchTimer);
            if (val.length > 2) {
                searchTimer = setTimeout(() => {
                    tg.sendData(val);
                }, 700);
            }
        }

        // Авто-подстройка цветов под тему Telegram
        tg.onEvent('themeChanged', () => {
            document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
            document.documentElement.style.setProperty('--text', tg.themeParams.text_color);
        });
        async function apiCall(endpoint, params = {}, method = 'GET') {
            const url = new URL(API_BASE + endpoint);
            if (method === 'GET') {
                Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
            }
            const options = {
                method: method,
                headers: {
                    'X-Telegram-Init-Data': initData,
                    'Content-Type': 'application/json'
                }
            };
            if (method === 'POST') {
                options.body = JSON.stringify(params);
            }
            const response = await fetch(url, options);
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            return await response.json();
        }
        let currentSearchMode = 'Nota';
        let searchPage = 0;

        async function performSearch(query) {
            if (query.length < 3) return;
            const data = await apiCall('/search', { q: query, mode: currentSearchMode, page: searchPage });
            renderTracks(data.results, 'searchResults');
        }

        function handleSearch(val) {
            clearTimeout(searchTimer);
            if (val.length > 2) {
                searchTimer = setTimeout(() => performSearch(val), 500);
            }
        }

        function setMode(mode) {
            currentSearchMode = mode;
            document.getElementById('chip-nota').classList.toggle('active', mode === 'Nota');
            document.getElementById('chip-sc').classList.toggle('active', mode === 'SoundCloud');
            // повторяем поиск с новым режимом
            const query = document.getElementById('searchInput').value;
            if (query.length > 2) performSearch(query);
        }
        async function loadFavorites() {
            const data = await apiCall('/favorites', { page: 0 });
            renderTracks(data.results, 'favResults');
        }
        function renderTracks(tracks, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (!tracks || tracks.length === 0) {
                container.innerHTML = '<p style="color: var(--hint); text-align: center; margin-top: 20px;">Ничего не найдено</p>';
                return;
            }

            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <div class="track-icon">🎵</div>
                    <div class="track-info">
                        <div class="track-name">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <button class="play-btn" style="background:none; border:none; font-size:20px; cursor:pointer;" data-url="${track.stream_url}">▶</button>
                    <button class="fav-btn" style="background:none; border:none; font-size:20px; cursor:pointer;" data-id="${track.id}">❤️</button>
                `;
                container.appendChild(card);
            });

            // Исправленные обработчики
            container.querySelectorAll('.play-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    playAudio(btn.dataset.url);
                };
            });

            container.querySelectorAll('.fav-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const trackId = btn.dataset.id;
                    // Исправлена строка запроса (удален лишний символ $)
                    await apiCall('/favorite/add', { track_id: trackId }, 'POST');
                    tg.HapticFeedback.notificationOccurred('success');
                };
            });
        }
        let audioContext = null;
        let audioElement = null;

        function playAudio(url) {
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }
            // Просто используем Audio, но можно и Web Audio
            audioElement = new Audio(url);
            audioElement.play();
            // Для Web Audio API нужно создать контекст и подключить, но для простоты оставим так.
        }
        async function uploadAudio(file) {
            const formData = new FormData();
            formData.append('file', file);
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                headers: {
                    'X-Telegram-Init-Data': initData
                },
                body: formData
            });
            const result = await response.json();
            if (result.success) {
                tg.showAlert('Трек загружен!');
            }
        }
    </script>
</body>
</html>
